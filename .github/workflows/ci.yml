name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Type Check & Lint ──────────────────────────────────────────────
  web-check:
    name: Frontend — Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter @applyflow/types build
          pnpm --filter @applyflow/shared build

      - name: Type check
        run: pnpm --filter @applyflow/web check

      - name: Lint
        run: pnpm --filter @applyflow/web lint

  # ─── Frontend Build ──────────────────────────────────────────────────────────
  web-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: web-check
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages and web app
        run: |
          pnpm --filter @applyflow/types build
          pnpm --filter @applyflow/shared build
          pnpm --filter @applyflow/web build

  # ─── API Lint ────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: apps/api
        run: poetry install --no-interaction

      - name: Ruff lint
        working-directory: apps/api
        run: poetry run ruff check . --select E,F,I

      - name: Ruff format check
        working-directory: apps/api
        run: poetry run ruff format --check .

  # ─── API Tests ───────────────────────────────────────────────────────────────
  api-test:
    name: API — Tests
    runs-on: ubuntu-latest
    needs: api-lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: applyflow
          POSTGRES_PASSWORD: applyflow
          POSTGRES_DB: applyflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: apps/api
        run: poetry install --no-interaction

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://applyflow:applyflow@localhost:5432/applyflow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
        run: poetry run alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://applyflow:applyflow@localhost:5432/applyflow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          OPENAI_API_KEY: sk-test-placeholder
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          ENVIRONMENT: test
        run: poetry run pytest -v --tb=short -x
