name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Lint & Type Check ──────────────────────────────────────────────
  web-check:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @applyflow/types build

      - name: Build shared package
        run: pnpm --filter @applyflow/shared build

      - name: Type check
        run: pnpm --filter @applyflow/web check

      - name: Lint
        run: pnpm --filter @applyflow/web lint

  # ─── Frontend Build ──────────────────────────────────────────────────────────
  web-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: web-check
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ─── API Lint ────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: apps/api
        run: poetry install --no-interaction

      - name: Ruff lint
        working-directory: apps/api
        run: poetry run ruff check .

      - name: Ruff format check
        working-directory: apps/api
        run: poetry run ruff format --check .

      - name: Mypy type check
        working-directory: apps/api
        run: poetry run mypy app/ --ignore-missing-imports || true

  # ─── API Tests ───────────────────────────────────────────────────────────────
  api-test:
    name: API — Tests
    runs-on: ubuntu-latest
    needs: api-lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: applyflow
          POSTGRES_PASSWORD: applyflow
          POSTGRES_DB: applyflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: apps/api
        run: poetry install --no-interaction

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://applyflow:applyflow@localhost:5432/applyflow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci
        run: poetry run alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://applyflow:applyflow@localhost:5432/applyflow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
        run: poetry run pytest -v --tb=short

  # ─── Security Scan ───────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
