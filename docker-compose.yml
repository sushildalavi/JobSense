version: "3.9"

# =============================================================================
# JobSense — Docker Compose (Production-like dev stack)
# =============================================================================

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobsense-postgres
    environment:
      POSTGRES_USER: jobsense
      POSTGRES_PASSWORD: jobsense
      POSTGRES_DB: jobsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsense -d jobsense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobsense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jobsense-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jobsense:jobsense@postgres:5432/jobsense
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jobsense-worker
    environment:
      DATABASE_URL: postgresql://jobsense:jobsense@postgres:5432/jobsense
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q ingestion,matching,ai,email,calendar,default

  # ─── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jobsense-beat
    environment:
      DATABASE_URL: postgresql://jobsense:jobsense@postgres:5432/jobsense
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./apps/api:/app
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ─── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: jobsense-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

  # ─── Flower (Celery monitoring) ──────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: jobsense-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: jobsense-network
